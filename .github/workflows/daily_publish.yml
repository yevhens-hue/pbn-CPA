name: Daily PBN Publication

on:
  schedule:
    # Запуск дважды в день: 07:00 UTC (10:00 Киев) и 15:00 UTC (18:00 Киев)
    - cron: '0 7,15 * * *'
  workflow_dispatch:
    # Возможность запустить вручную кнопкой в интерфейсе GitHub

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f PBN_Automation_Final/requirements.txt ]; then
            pip install -r PBN_Automation_Final/requirements.txt
          else
            # Fallback if requirements is in root
            pip install gspread oauth2client requests python-dotenv google-auth google-auth-oauthlib google-auth-httplib2
          fi

      - name: Run Publication Batch
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # Сообщаем скрипту, что мы в GitHub Actions
          PYTHONPATH: ${{ github.workspace }}/PBN_Automation_Final
        run: |
          cd PBN_Automation_Final
          python3 agent_manager.py

      - name: Bulk Index All Published URLs
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          PYTHONPATH: ${{ github.workspace }}/PBN_Automation_Final
        run: |
          cd PBN_Automation_Final
          # Отправить все статьи со статусом Success в Google Indexing API
          python3 core/bulk_indexer.py || echo "Bulk indexer skipped"

      - name: Auto-Comment on New Articles
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PYTHONPATH: ${{ github.workspace }}/PBN_Automation_Final
        run: |
          cd PBN_Automation_Final/core
          # Оставляем комментарии на 3 последних статьи без комментариев
          python3 auto_commenter.py --backfill --count 3 || echo "Auto-commenter skipped"


      - name: Commit results
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add PBN_Automation_Final/results.json PBN_Automation_Final/verification_report.json PBN_Automation_Final/execution_summary.csv PBN_Automation_Final/financial_report.csv || echo "No files to add"
          git commit -m "Update publication results [skip ci]" || echo "No changes to commit"
          git push

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              -d text="⚠️ PBN Daily Publish FAILED at $(date -u '+%Y-%m-%d %H:%M UTC')%0ACheck: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              -d parse_mode="HTML"
          fi
